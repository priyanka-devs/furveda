{% extends 'base.html' %}
{% load static %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">
{% endblock %}


{% block title %}Create Account - Furveda{% endblock %}

{% block content %}




<div class="login-page-wrapper">
  
  <div class="login-left">
    <div class="login-form-container">
      <h1 class="login-title">Join Furveda.</h1>
      <p class="login-subtitle">Create an account to start your wellness journey.</p>
      


      <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="fv-input-group">
          <label for="name">Full Name</label>
          <input type="text" name="name" id="name" class="fv-input" placeholder="Your Name" required>
        </div>
        
        <div class="fv-input-group">
          <label for="email">Email Address</label>
          <input type="email" name="email" id="email" class="fv-input" placeholder="you@example.com" required>
        </div>
        
        <div class="fv-input-group">
          <label for="phone">Phone Number (For Password Reset)</label>
          <input type="text" name="phone" id="phone" class="fv-input" placeholder="e.g. 9999999999" required>
        </div>
        
        <div class="fv-input-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" class="fv-input" placeholder="Create a password" required>
        </div>
        
        <button type="submit" class="login-btn">R E G I S T E R</button>
      </form>
      
      <div class="register-link">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
      </div>
    </div>
  </div>
  
  <div class="login-right">
    <!-- Background image handles visual -->
  </div>
  
</div>

{% endblock %}
