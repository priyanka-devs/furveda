{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Furveda{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-page-wrapper">
  
  <div class="login-left">
    <div class="login-form-container">
      <h1 class="login-title">Success!</h1>
      <p class="login-subtitle" style="color: green;">Your password has been successfully set.</p>
      <p class="login-subtitle">You may now log in with your new password.</p>
      
      <div style="margin-top: 30px;">
        <a href="{% url 'login' %}" class="login-btn" style="text-decoration: none; display: inline-block; text-align: center;">L O G   I N</a>
      </div>
    </div>
  </div>
  
  <div class="login-right">
    <!-- Background image handles visual -->
  </div>
  
</div>
{% endblock %}
